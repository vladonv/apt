name: Rebuild APT repository

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install reprepro and gnupg
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      # Was a plain `echo "$GPG_PRIVATE_KEY" | gpg --batch --import` - root
      # cause found for the intermittent "Could not find any key matching
      # <fingerprint>!" failures reprepro started hitting once this
      # workflow began calling it (and therefore gpg-agent) several times
      # per job instead of just once: a bare `gpg --import` never writes a
      # gpg-agent.conf or tells the freshly-auto-spawned agent to reload,
      # so its very first state can be subtly incomplete, and never sets
      # ownertrust on the imported key either. This action (widely used
      # specifically for "sign things with GPG in CI") does both of those
      # - see its src/gpg.ts: configureAgent() writes gpg-agent.conf then
      # sends RELOADAGENT, and setTrustLevel() runs `gpg --edit-key ...
      # trust` - neither of which the hand-rolled version ever did.
      - name: Import signing key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          trust_level: 5

      # Belt-and-braces on top of the action above: force one real signing
      # operation to happen *now*, in its own step with a clear pass/fail
      # signal, rather than letting reprepro's own signing calls later be
      # the very first thing that exercises gpg-agent for real. Local
      # reproduction attempts (10/10 clean, fresh-GNUPGHOME runs on a
      # dev machine) never hit the intermittent "Could not find any key
      # matching ..." reprepro sees in this specific GitHub Actions
      # environment - this doesn't look like a logic bug in this workflow
      # so much as runner-specific timing/entropy flakiness the first time
      # gpg-agent is actually asked to sign something. Warming it up here
      # can't hurt and may absorb whatever that first-use hiccup is before
      # reprepro's own (harder to retry mid-export) signing calls need it.
      - name: Warm up gpg-agent with a real signing operation
        run: echo "warmup" | gpg --batch --yes --local-user "${{ steps.import_gpg.outputs.fingerprint }}" --clearsign > /dev/null

      # Add new source repos here as they come online - that's the only
      # workflow edit adding a project needs. `|| true` so one repo with no
      # matching release yet (e.g. brand new) doesn't fail the whole run.
      - name: Download latest .deb from every source repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dl
          for repo in vladonv/monast vladonv/starpy vladonv/tg2sip-webrtc; do
            gh release download -R "$repo" -p "*.deb" -D dl --clobber || true
          done
          # dbgsym packages (huge - tg2sip-webrtc's is ~500MB) belong on
          # GitHub Releases for occasional debugging downloads, not in a
          # git-committed reprepro pool that grows forever across rebuilds.
          find dl -iname '*-dbgsym_*.deb' -delete

      - name: Include packages into the matching codename(s)
        run: |
          shopt -s nullglob
          # Keep in sync with conf/distributions' per-release Codename
          # stanzas. A package routes here by carrying a `~<codename>`
          # suffix in its own Version: field (the standard `dch --local`
          # convention - see e.g. vladonv/tg2sip-webrtc's CI) - no
          # per-project routing rules to maintain here, any project that
          # follows the convention Just Works.
          codenames=(bookworm trixie)
          all_codenames=(stable "${codenames[@]}")

          # Even batched (one reprepro invocation per codename, not per
          # package), a real run still hit "Could not find any key
          # matching <keyid>!" on whichever codename was processed *last*
          # - looks like transient gpg-agent flakiness under several
          # signing calls in quick succession (all within the same
          # second), not a real missing-key problem: earlier calls in the
          # same run using the exact same key succeeded. Retry with a
          # short backoff rather than fail the whole rebuild over what's
          # very likely a one-off agent hiccup.
          reprepro_retry() {
            local attempt
            for attempt in 1 2 3; do
              if reprepro "$@"; then
                return 0
              fi
              echo "::warning::'reprepro $*' failed (attempt $attempt/3)"
              sleep 3
            done
            echo "::warning::'reprepro $*' failed after 3 attempts - check the log above"
            return 1
          }

          debs=(dl/*.deb)
          if [ ${#debs[@]} -eq 0 ]; then
            echo "No .deb files downloaded, nothing to do."
            exit 0
          fi

          # Bucket every downloaded .deb by target codename first, then
          # call `reprepro includedeb <codename> file1 file2 ...` once per
          # codename at the end - NOT once per file. An earlier version of
          # this step called reprepro separately for every (file, codename)
          # pair, which made many more reprepro invocations than this
          # script had before multi-codename support existed, and that was
          # observed in practice to intermittently break GPG signing
          # ("Could not find any key matching ...") partway through a run -
          # batching avoids hammering reprepro/gpg-agent like that, and
          # matches how this script's single `includedeb` call worked
          # before this rework.
          declare -A bucket=()
          for cn in "${all_codenames[@]}"; do
            bucket[$cn]=""
          done

          for deb in "${debs[@]}"; do
            version="$(dpkg-deb -f "$deb" Version)"
            matched=0
            for cn in "${codenames[@]}"; do
              if [[ "$version" == *"~$cn"* ]]; then
                bucket[$cn]+=" $deb"
                matched=1
              fi
            done
            if [ "$matched" -eq 1 ]; then
              continue
            fi
            if [[ "$version" == *"~"* ]]; then
              # Has a suffix but it didn't match any codename above - don't
              # guess, that's very likely a new target release (e.g. an
              # Ubuntu suite) whose codename hasn't been added to this
              # workflow and conf/distributions yet, not a package meant
              # for every distribution.
              echo "::warning::$deb has version $version with a '~' suffix not matching any of: ${codenames[*]} - skipping. Add its codename here and to conf/distributions if it's a new target release."
              continue
            fi
            # No suffix at all - built once for any Debian release
            # (Architecture: all, e.g. monast/starpy). Goes into every
            # current codename, plus the legacy 'stable' one so existing
            # installs (sources.list still pointing at "stable") keep
            # working without needing to switch over immediately.
            for cn in "${all_codenames[@]}"; do
              bucket[$cn]+=" $deb"
            done
          done

          for cn in "${all_codenames[@]}"; do
            # Unquoted on purpose: word-split the space-joined file list
            # back into separate arguments (filenames here never contain
            # spaces in practice - they're generated by dpkg-buildpackage).
            if [ -n "${bucket[$cn]}" ]; then
              # `|| true`: a permanent (non-transient) failure - e.g. a
              # real pool collision - must not abort the rest of this
              # script under `bash -e`, same reasoning as the plain `||
              # echo` guard this replaced. reprepro_retry's own internal
              # warnings already explain what happened.
              reprepro_retry includedeb "$cn" ${bucket[$cn]} || true
            fi
          done

          # If any package in a codename's batch failed above (e.g. a real
          # pool collision - verified locally: two same Package+Version+
          # Architecture files with different content), reprepro leaves
          # that codename's on-disk Packages/Release files stale relative
          # to what actually made it into the database, and says so
          # ("Changes will only be visible after the next 'export'").
          # Force a full export of every distribution so dists/ is always
          # consistent with db/ before this gets committed, independent of
          # any single package's failure above.
          reprepro_retry export || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db dists pool
          if git diff --cached --quiet; then
            echo "No changes to the repository."
          else
            git commit -m "Rebuild repository ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi

      # Commits pushed above use the default GITHUB_TOKEN, which GitHub
      # deliberately does not use to trigger other workflows (recursion
      # guard) - so pages.yml's `on: push` never fires for them. Deploy
      # directly here instead of relying on that chain.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
