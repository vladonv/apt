name: Rebuild APT repository

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install reprepro and gnupg
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      # Add new source repos here as they come online - that's the only
      # workflow edit adding a project needs. `|| true` so one repo with no
      # matching release yet (e.g. brand new) doesn't fail the whole run.
      - name: Download latest .deb from every source repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dl
          for repo in vladonv/monast vladonv/starpy vladonv/tg2sip-webrtc; do
            gh release download -R "$repo" -p "*.deb" -D dl --clobber || true
          done
          # dbgsym packages (huge - tg2sip-webrtc's is ~500MB) belong on
          # GitHub Releases for occasional debugging downloads, not in a
          # git-committed reprepro pool that grows forever across rebuilds.
          find dl -iname '*-dbgsym_*.deb' -delete

      - name: Include packages into the matching codename(s)
        run: |
          shopt -s nullglob
          # Keep in sync with conf/distributions' per-release Codename
          # stanzas. A package routes here by carrying a `~<codename>`
          # suffix in its own Version: field (the standard `dch --local`
          # convention - see e.g. vladonv/tg2sip-webrtc's CI) - no
          # per-project routing rules to maintain here, any project that
          # follows the convention Just Works.
          codenames=(bookworm trixie)

          debs=(dl/*.deb)
          if [ ${#debs[@]} -eq 0 ]; then
            echo "No .deb files downloaded, nothing to do."
            exit 0
          fi

          for deb in "${debs[@]}"; do
            version="$(dpkg-deb -f "$deb" Version)"
            matched=0
            for cn in "${codenames[@]}"; do
              if [[ "$version" == *"~$cn"* ]]; then
                # GitHub Actions runs `run:` steps with `bash -e` by
                # default - without this guard, one bad package (a real
                # reprepro rejection, e.g. a missing control field) would
                # abort the whole step and skip every package still queued
                # behind it, not just the broken one.
                reprepro includedeb "$cn" "$deb" || echo "::warning::failed to include $deb into $cn"
                matched=1
              fi
            done
            if [ "$matched" -eq 1 ]; then
              continue
            fi
            if [[ "$version" == *"~"* ]]; then
              # Has a suffix but it didn't match any codename above - don't
              # guess, that's very likely a new target release (e.g. an
              # Ubuntu suite) whose codename hasn't been added to this
              # workflow and conf/distributions yet, not a package meant
              # for every distribution.
              echo "::warning::$deb has version $version with a '~' suffix not matching any of: ${codenames[*]} - skipping. Add its codename here and to conf/distributions if it's a new target release."
              continue
            fi
            # No suffix at all - built once for any Debian release
            # (Architecture: all, e.g. monast/starpy). Goes into every
            # current codename, plus the legacy 'stable' one so existing
            # installs (sources.list still pointing at "stable") keep
            # working without needing to switch over immediately.
            for cn in stable "${codenames[@]}"; do
              reprepro includedeb "$cn" "$deb" || echo "::warning::failed to include $deb into $cn"
            done
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db dists pool
          if git diff --cached --quiet; then
            echo "No changes to the repository."
          else
            git commit -m "Rebuild repository ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi

      # Commits pushed above use the default GITHUB_TOKEN, which GitHub
      # deliberately does not use to trigger other workflows (recursion
      # guard) - so pages.yml's `on: push` never fires for them. Deploy
      # directly here instead of relying on that chain.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
